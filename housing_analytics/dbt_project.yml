name: 'housing_analytics'
version: '1.0.0'
config-version: 2

# This tells dbt which profile in ~/.dbt/profiles.yml to use for connections
profile: 'housing_analytics'

# File path configurations — these are dbt defaults, keep them as is
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Materialization strategy per layer
# view = SQL runs on demand, no storage cost (good for staging/intermediate)
# table = results stored physically, faster to query (good for final marts)
models:
  housing_analytics:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
